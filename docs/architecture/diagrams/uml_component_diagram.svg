<svg width="700" height="520" viewBox="0 0 700 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="700" height="520" fill="white"/>
  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">UML Component Diagram — Student Productivity App</text>

  <!-- Frontend box -->
  <rect x="20" y="50" width="185" height="230" rx="10" fill="#EEF4FB" stroke="#378ADD" stroke-width="1"/>
  <text x="112" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#0C447C">React Frontend</text>
  <text x="112" y="90" text-anchor="middle" font-size="11" fill="#185FA5">Presentation Layer</text>
  <rect x="38" y="105" width="149" height="34" rx="6" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.8"/>
  <text x="112" y="126" text-anchor="middle" font-size="11" fill="#0C447C">Dashboard screen</text>
  <rect x="38" y="150" width="149" height="34" rx="6" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.8"/>
  <text x="112" y="171" text-anchor="middle" font-size="11" fill="#0C447C">Schedule screen</text>
  <rect x="38" y="195" width="149" height="34" rx="6" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.8"/>
  <text x="112" y="216" text-anchor="middle" font-size="11" fill="#0C447C">Assignment screen</text>
  <rect x="38" y="240" width="149" height="30" rx="6" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.8"/>
  <text x="112" y="259" text-anchor="middle" font-size="11" fill="#0C447C">Study planner screen</text>

  <!-- Arrow: Frontend -> Backend -->
  <line x1="205" y1="155" x2="258" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="258" y1="170" x2="205" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="231" y="148" text-anchor="middle" font-size="10" fill="#444">REST API</text>

  <!-- Backend box -->
  <rect x="258" y="50" width="200" height="310" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="358" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041">Django Backend</text>
  <text x="358" y="90" text-anchor="middle" font-size="11" fill="#0F6E56">Application Layer</text>
  <rect x="274" y="105" width="168" height="30" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="358" y="124" text-anchor="middle" font-size="11" fill="#085041">Auth service</text>
  <rect x="274" y="145" width="168" height="30" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="358" y="164" text-anchor="middle" font-size="11" fill="#085041">Schedule service</text>
  <rect x="274" y="185" width="168" height="30" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="358" y="204" text-anchor="middle" font-size="11" fill="#085041">Assignment service</text>
  <rect x="274" y="225" width="168" height="30" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="358" y="244" text-anchor="middle" font-size="11" fill="#085041">Study planner service</text>
  <rect x="274" y="265" width="168" height="30" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="358" y="284" text-anchor="middle" font-size="11" fill="#085041">Notification service</text>
  <rect x="274" y="305" width="168" height="44" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="358" y="325" text-anchor="middle" font-size="11" fill="#085041">Django REST Framework</text>
  <text x="358" y="340" text-anchor="middle" font-size="10" fill="#0F6E56">API endpoint routing</text>

  <!-- Arrow: Backend -> DB -->
  <line x1="458" y1="175" x2="505" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="481" y="167" text-anchor="middle" font-size="10" fill="#444">ORM queries</text>

  <!-- Database box -->
  <rect x="505" y="110" width="165" height="110" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="587" y="138" text-anchor="middle" font-size="13" font-weight="bold" fill="#633806">PostgreSQL</text>
  <text x="587" y="154" text-anchor="middle" font-size="11" fill="#854F0B">Data Layer</text>
  <rect x="520" y="164" width="135" height="46" rx="6" fill="#FAC775" stroke="#BA7517" stroke-width="0.8"/>
  <text x="587" y="184" text-anchor="middle" font-size="11" fill="#633806">users · schedules</text>
  <text x="587" y="200" text-anchor="middle" font-size="11" fill="#633806">assignments · sessions</text>

  <!-- Arrow: Backend -> Celery (dashed) -->
  <line x1="358" y1="360" x2="358" y2="405" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="358" y1="405" x2="505" y2="405" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Celery box -->
  <rect x="505" y="370" width="165" height="60" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="587" y="396" text-anchor="middle" font-size="13" font-weight="bold" fill="#4A1B0C">Celery</text>
  <text x="587" y="412" text-anchor="middle" font-size="11" fill="#712B13">Async notification tasks</text>

  <!-- Arrow: Celery -> Student device (dashed) -->
  <line x1="505" y1="400" x2="215" y2="400" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="360" y="393" text-anchor="middle" font-size="10" fill="#666">Push notification</text>

  <!-- Student device box -->
  <rect x="20" y="375" width="190" height="50" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="115" y="403" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">Student device</text>

  <!-- Legend -->
  <line x1="30" y1="462" x2="60" y2="462" stroke="#555" stroke-width="1.5"/>
  <text x="68" y="466" font-size="10" fill="#444">Synchronous (REST / ORM)</text>
  <line x1="200" y1="462" x2="230" y2="462" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="238" y="466" font-size="10" fill="#444">Asynchronous (Celery / push)</text>
</svg>
