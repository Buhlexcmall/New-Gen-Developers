<svg width="700" height="500" viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 555" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="700" height="500" fill="white"/>
  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Data Flow Diagram — Student Productivity App</text>

  <!-- Flow labels (left) -->
  <text x="10" y="95" font-size="10" fill="#888" font-weight="bold">1. Auth</text>
  <text x="10" y="195" font-size="10" fill="#888" font-weight="bold">2. Schedule</text>
  <text x="10" y="295" font-size="10" fill="#888" font-weight="bold">3. Assignment</text>
  <text x="10" y="395" font-size="10" fill="#888" font-weight="bold">4. Notify</text>

  <!-- Row 1: Authentication -->
  <rect x="50" y="68" width="110" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="105" y="94" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">Student</text>
  <line x1="160" y1="90" x2="255" y2="90" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="207" y="82" text-anchor="middle" font-size="10" fill="#333">Register / login</text>
  <rect x="255" y="68" width="150" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="330" y="94" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">Backend</text>
  <line x1="405" y1="90" x2="490" y2="90" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="447" y="82" text-anchor="middle" font-size="10" fill="#333">Store user data</text>
  <rect x="490" y="68" width="155" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="567" y="94" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">PostgreSQL DB</text>
  <line x1="490" y1="100" x2="405" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="447" y="112" text-anchor="middle" font-size="10" fill="#333">Confirm stored</text>
  <line x1="255" y1="100" x2="160" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="207" y="112" text-anchor="middle" font-size="10" fill="#333">Auth token</text>

  <line x1="350" y1="112" x2="350" y2="140" stroke="#ddd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Row 2: Schedule -->
  <rect x="50" y="158" width="110" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="105" y="184" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">Student</text>
  <line x1="160" y1="178" x2="255" y2="178" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="207" y="170" text-anchor="middle" font-size="10" fill="#333">Add class</text>
  <rect x="255" y="158" width="150" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="330" y="184" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">Backend</text>
  <line x1="405" y1="178" x2="490" y2="178" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="447" y="170" text-anchor="middle" font-size="10" fill="#333">Save schedule</text>
  <rect x="490" y="158" width="155" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="567" y="184" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">PostgreSQL DB</text>
  <line x1="255" y1="190" x2="160" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="207" y="202" text-anchor="middle" font-size="10" fill="#333">Display schedule</text>

  <line x1="350" y1="202" x2="350" y2="230" stroke="#ddd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Row 3: Assignment -->
  <rect x="50" y="248" width="110" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="105" y="274" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">Student</text>
  <line x1="160" y1="268" x2="255" y2="268" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="207" y="260" text-anchor="middle" font-size="10" fill="#333">Add assignment</text>
  <rect x="255" y="248" width="150" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="330" y="274" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">Backend</text>
  <line x1="405" y1="268" x2="490" y2="268" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="447" y="260" text-anchor="middle" font-size="10" fill="#333">Save assignment</text>
  <rect x="490" y="248" width="155" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="567" y="274" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">PostgreSQL DB</text>
  <line x1="255" y1="280" x2="160" y2="280" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="207" y="292" text-anchor="middle" font-size="10" fill="#333">Confirm saved</text>

  <line x1="350" y1="292" x2="350" y2="330" stroke="#ddd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Row 4: Notifications -->
  <rect x="255" y="348" width="150" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="330" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">Celery</text>
  <text x="330" y="382" text-anchor="middle" font-size="10" fill="#0F6E56">Scheduler</text>
  <line x1="490" y1="368" x2="405" y2="368" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="447" y="360" text-anchor="middle" font-size="10" fill="#666">Read deadlines</text>
  <rect x="490" y="348" width="155" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="567" y="375" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">PostgreSQL DB</text>
  <rect x="50" y="348" width="110" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="105" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">Student</text>
  <text x="105" y="382" text-anchor="middle" font-size="10" fill="#185FA5">device</text>
  <line x1="255" y1="370" x2="160" y2="370" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="207" y="362" text-anchor="middle" font-size="10" fill="#666">Push notification</text>

  <!-- Legend -->
  <line x1="50" y1="460" x2="80" y2="460" stroke="#555" stroke-width="1.5"/>
  <text x="88" y="464" font-size="10" fill="#444">Synchronous request/response</text>
  <line x1="280" y1="460" x2="310" y2="460" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="318" y="464" font-size="10" fill="#444">Asynchronous (background task)</text>
</svg>
