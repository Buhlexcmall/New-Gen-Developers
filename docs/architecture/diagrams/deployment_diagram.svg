<svg width="700" height="450" viewBox="0 0 700 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="700" height="450" fill="white"/>
  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Deployment Diagram — Student Productivity App</text>

  <!-- Student device node -->
  <rect x="20" y="55" width="145" height="150" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="92" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C2C2A">Student device</text>
  <text x="92" y="93" text-anchor="middle" font-size="10" fill="#444441">Browser / mobile app</text>
  <rect x="35" y="105" width="115" height="50" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.8"/>
  <text x="92" y="127" text-anchor="middle" font-size="11" font-weight="bold" fill="#0C447C">React app</text>
  <text x="92" y="141" text-anchor="middle" font-size="10" fill="#185FA5">Web / mobile UI</text>
  <rect x="35" y="162" width="115" height="34" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="92" y="183" text-anchor="middle" font-size="10" fill="#2C2C2A">Port 3000 (dev)</text>

  <!-- Arrow Device -> App Server -->
  <line x1="165" y1="130" x2="213" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="213" y1="145" x2="165" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="189" y="120" text-anchor="middle" font-size="10" fill="#333">HTTPS</text>
  <text x="189" y="160" text-anchor="middle" font-size="9" fill="#888">JSON / REST</text>

  <!-- App server node -->
  <rect x="213" y="55" width="175" height="250" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="300" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">App server</text>
  <text x="300" y="93" text-anchor="middle" font-size="10" fill="#0F6E56">Render.com / Railway</text>
  <rect x="227" y="108" width="147" height="50" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="300" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#085041">Django backend</text>
  <text x="300" y="144" text-anchor="middle" font-size="10" fill="#0F6E56">REST API — port 8000</text>
  <rect x="227" y="168" width="147" height="44" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="300" y="188" text-anchor="middle" font-size="11" font-weight="bold" fill="#085041">Celery worker</text>
  <text x="300" y="202" text-anchor="middle" font-size="10" fill="#0F6E56">Async task processing</text>
  <rect x="227" y="222" width="147" height="40" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="300" y="242" text-anchor="middle" font-size="11" font-weight="bold" fill="#085041">Redis</text>
  <text x="300" y="256" text-anchor="middle" font-size="10" fill="#0F6E56">Message broker</text>
  <rect x="227" y="272" width="147" height="24" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text x="300" y="288" text-anchor="middle" font-size="10" fill="#2C2C2A">gunicorn WSGI server</text>

  <!-- Arrow App Server -> DB -->
  <line x1="388" y1="155" x2="432" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="432" y1="170" x2="388" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="410" y="147" text-anchor="middle" font-size="10" fill="#333">DB queries</text>
  <text x="410" y="184" text-anchor="middle" font-size="9" fill="#888">Port 5432</text>

  <!-- Database server node -->
  <rect x="432" y="55" width="175" height="210" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="519" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">Database server</text>
  <text x="519" y="93" text-anchor="middle" font-size="10" fill="#854F0B">Render Postgres managed</text>
  <rect x="446" y="108" width="147" height="70" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.8"/>
  <text x="519" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#633806">PostgreSQL 16</text>
  <text x="519" y="148" text-anchor="middle" font-size="10" fill="#854F0B">users, schedules</text>
  <text x="519" y="163" text-anchor="middle" font-size="10" fill="#854F0B">assignments, sessions</text>
  <rect x="446" y="188" width="147" height="34" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.8"/>
  <text x="519" y="208" text-anchor="middle" font-size="11" font-weight="bold" fill="#633806">Automated backups</text>
  <rect x="446" y="230" width="147" height="24" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text x="519" y="246" text-anchor="middle" font-size="10" fill="#2C2C2A">SSL/TLS connection</text>

  <!-- Email service node -->
  <rect x="432" y="310" width="175" height="80" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="519" y="333" text-anchor="middle" font-size="12" font-weight="bold" fill="#26215C">Email service</text>
  <text x="519" y="349" text-anchor="middle" font-size="10" fill="#3C3489">SMTP / SendGrid</text>
  <text x="519" y="368" text-anchor="middle" font-size="10" fill="#534AB7">Password reset + reminders</text>

  <!-- Arrow App Server -> Email (dashed) -->
  <line x1="388" y1="220" x2="390" y2="350" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="390" y1="350" x2="430" y2="350" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr2)"/>

  <!-- Environment bar -->
  <rect x="20" y="410" width="655" height="30" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.8"/>
  <text x="347" y="429" text-anchor="middle" font-size="10" fill="#444">Development: localhost · Staging/Production: Render.com (free tier) · DB: Render PostgreSQL managed instance</text>

  <!-- Legend -->
  <line x1="30" y1="385" x2="60" y2="385" stroke="#555" stroke-width="1.5"/>
  <text x="68" y="389" font-size="10" fill="#444">Synchronous (HTTPS / SQL)</text>
  <line x1="230" y1="385" x2="260" y2="385" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="268" y="389" font-size="10" fill="#444">Asynchronous (email / queue)</text>
</svg>
